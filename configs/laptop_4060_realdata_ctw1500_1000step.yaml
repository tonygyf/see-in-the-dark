seed: 42
device: cuda

train:
  epochs: 1
  steps_per_epoch: 1000
  batch_size: 2
  image_size: 512
  lr: 0.0002
  grad_accum_steps: 4
  amp: true
  channels_last: true
  clip_grad_norm: 1.0
  log_interval: 50

model:
  in_channels: 3
  base_channels: 32
  num_classes: 1

data:
  use_ctw1500_paddle_test: true
  imgs_root: data/raw/ctw1500/paddle_format/ctw1500/imgs
  split_file: data/raw/ctw1500/paddle_format/ctw1500/imgs/test.txt
  num_workers: 0
  pin_memory: true

quantization:
  enable_qat: false
  backend: fbgemm
  note: "CTW1500 真实数据 1000 step 训练（4060 稳定优先）"
